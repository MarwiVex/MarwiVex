<svg xmlns="http://www.w3.org/2000/svg" width="45" height="32" viewBox="0 0 45 32">
  <style>
    .terminal { 
      font-family: 'Courier New', Consolas, monospace; 
      font-size: 32px; 
      font-weight: bold; 
      fill: #58A6FF;
    }
    .blink { 
      animation: blinker 1s step-end infinite; 
    }
    @keyframes blinker { 
      50% { opacity: 0; } 
    }
  </style>
  <text x="0" y="26" class="terminal">></text>
  <text x="22" y="26" class="terminal blink">_</text>
</svg>
