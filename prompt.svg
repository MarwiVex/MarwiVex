<svg xmlns="http://www.w3.org/2000/svg" width="50" height="40" viewBox="0 0 50 40">
  <style>
    .terminal { 
      font-family: 'Courier New', Consolas, monospace; 
      font-size: 32px; 
      font-weight: bold; 
      fill: #E6EDF3; 
    }
    .blink { 
      animation: blinker 1s step-end infinite; 
    }
    @keyframes blinker { 
      50% { opacity: 0; } 
    }
  </style>
  <text x="0" y="50%" dominant-baseline="central" class="terminal">></text>
  <text x="22" y="50%" dominant-baseline="central" class="terminal blink">_</text>
</svg>
