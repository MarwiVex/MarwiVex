<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00599C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      from, to { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  <polyline points="4 17 10 11 4 5"></polyline>
  <line class="cursor" x1="12" y1="19" x2="20" y2="19"></line>
</svg>
